<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background with rounded corners -->
  <rect x="2" y="2" width="28" height="28" rx="6" fill="#7c3aed"/>
  
  <!-- Gradient overlay -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect x="2" y="2" width="28" height="28" rx="6" fill="url(#grad)"/>
  
  <!-- Notebook lines -->
  <line x1="8" y1="10" x2="24" y2="10" stroke="rgba(255,255,255,0.3)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="8" y1="15" x2="24" y2="15" stroke="rgba(255,255,255,0.3)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="8" y1="20" x2="20" y2="20" stroke="rgba(255,255,255,0.3)" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- Smile face -->
  <circle cx="24" cy="22" r="5" fill="#fbbf24"/>
  <circle cx="22.5" cy="21" r="0.8" fill="#374151"/>
  <circle cx="25.5" cy="21" r="0.8" fill="#374151"/>
  <path d="M 22 23.5 Q 24 25 26 23.5" stroke="#374151" stroke-width="1" fill="none" stroke-linecap="round"/>
</svg>
